name: Deploy website

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: website-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Prepare SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Create release name
        id: release
        run: echo "name=$(date -u +%Y%m%d%H%M%S)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Upload release
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PORT: ${{ vars.VPS_PORT }}
          VPS_USER: ${{ vars.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH }}
          RELEASE_NAME: ${{ steps.release.outputs.name }}
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "mkdir -p '$VPS_DEPLOY_PATH/releases/$RELEASE_NAME'"

          rsync -az --delete \
            -e "ssh -p $VPS_PORT" \
            dist/ \
            "$VPS_USER@$VPS_HOST:$VPS_DEPLOY_PATH/releases/$RELEASE_NAME/"

      - name: Activate release and clean old ones
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PORT: ${{ vars.VPS_PORT }}
          VPS_USER: ${{ vars.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH }}
          RELEASE_NAME: ${{ steps.release.outputs.name }}
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "
            ln -sfn '$VPS_DEPLOY_PATH/releases/$RELEASE_NAME' '$VPS_DEPLOY_PATH/current' &&
            cd '$VPS_DEPLOY_PATH/releases' &&
            ls -1dt */ | tail -n +6 | xargs -r rm -rf
          "
