name: Deploy quote worker

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-quote-worker.yml'
      - 'cloudflare/quote-form-worker/**'
  workflow_dispatch:

concurrency:
  group: quote-worker-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22.12.0'

      - name: Install Wrangler
        run: npm install --global wrangler

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          FORWARD_EMAIL_API_TOKEN: ${{ secrets.FORWARD_EMAIL_API_TOKEN }}
          FORWARD_EMAIL_FROM_EMAIL: ${{ secrets.FORWARD_EMAIL_FROM_EMAIL }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          OFFICEAPP_QUOTE_WEBHOOK_URL: ${{ secrets.OFFICEAPP_QUOTE_WEBHOOK_URL }}
          OFFICEAPP_QUOTE_WEBHOOK_SECRET: ${{ secrets.OFFICEAPP_QUOTE_WEBHOOK_SECRET }}
          QUOTE_TO_EMAIL: ${{ secrets.QUOTE_TO_EMAIL }}
          ALLOWED_ORIGIN: ${{ secrets.ALLOWED_ORIGIN }}
        run: |
          printf '%s' "$TURNSTILE_SECRET_KEY" | wrangler secret put TURNSTILE_SECRET_KEY --config cloudflare/quote-form-worker/wrangler.toml
          printf '%s' "$FORWARD_EMAIL_API_TOKEN" | wrangler secret put FORWARD_EMAIL_API_TOKEN --config cloudflare/quote-form-worker/wrangler.toml
          printf '%s' "$FORWARD_EMAIL_FROM_EMAIL" | wrangler secret put FORWARD_EMAIL_FROM_EMAIL --config cloudflare/quote-form-worker/wrangler.toml
          if [ -n "$GOOGLE_MAPS_API_KEY" ]; then
            printf '%s' "$GOOGLE_MAPS_API_KEY" | wrangler secret put GOOGLE_MAPS_API_KEY --config cloudflare/quote-form-worker/wrangler.toml
          fi
          if [ -n "$OFFICEAPP_QUOTE_WEBHOOK_URL" ]; then
            printf '%s' "$OFFICEAPP_QUOTE_WEBHOOK_URL" | wrangler secret put OFFICEAPP_QUOTE_WEBHOOK_URL --config cloudflare/quote-form-worker/wrangler.toml
          fi
          if [ -n "$OFFICEAPP_QUOTE_WEBHOOK_SECRET" ]; then
            printf '%s' "$OFFICEAPP_QUOTE_WEBHOOK_SECRET" | wrangler secret put OFFICEAPP_QUOTE_WEBHOOK_SECRET --config cloudflare/quote-form-worker/wrangler.toml
          fi
          printf '%s' "$QUOTE_TO_EMAIL" | wrangler secret put QUOTE_TO_EMAIL --config cloudflare/quote-form-worker/wrangler.toml
          printf '%s' "$ALLOWED_ORIGIN" | wrangler secret put ALLOWED_ORIGIN --config cloudflare/quote-form-worker/wrangler.toml
          wrangler deploy --config cloudflare/quote-form-worker/wrangler.toml
